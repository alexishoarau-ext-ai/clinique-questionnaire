<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Questionnaire de satisfaction</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f7fb;
    padding: 50px;
}
.container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
h1 {
    color: #2c3e50;
}
button {
    padding: 15px 30px;
    margin: 15px;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
}
.yes {
    background-color: #2ecc71;
    color: white;
}
.no {
    background-color: #e74c3c;
    color: white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Votre avis compte</h1>
    <p>Souhaitez-vous répondre à notre questionnaire de satisfaction ?</p>

    <button class="yes" onclick="window.location.href='https://docs.google.com/forms/d/e/1FAIpQLSd2-nYAleHoDwqBmirgkUuLa1XKjqM24bjs0Ce1y0Pa2-Tx6w/viewform?usp=header'">
        Oui
    </button>

    <button class="no" onclick="alert('Merci pour votre visite !')">
        Non
    </button>
</div>

</body>
</html>
